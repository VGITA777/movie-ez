<section class="search w-full h-full flex flex-col gap-4 relative p-4">

  <div class="search-header sticky flex flex-col gap-4 top-0 z-100 bg-background py-4">

    <div class="search__container flex flex-row gap-2">
      <div hlmInputGroup class="rounded-full">
        <input hlmInputGroupInput type="text" placeholder="Search..." />
        <div hlmInputGroupAddon>
          <ng-icon name="lucideSearch"></ng-icon>
        </div>
      </div>
      <button hlmBtn hlmDialogClose class="rounded-full">
        <ng-icon name="lucideX" />
      </button>
    </div>

    <hlm-toggle-group variant="outline" value="mixed">
      <button hlmToggleGroupItem class="w-18" value="mixed" aria-label="Toggle Mixed Search">Mixed
      </button>
      <button hlmToggleGroupItem class="w-18" value="movies" aria-label="Toggle Movies Search">
        Movies
      </button>
      <button hlmToggleGroupItem class="w-18" value="tv" aria-label="Toggle TV Shows Search">TV
      </button>
    </hlm-toggle-group>
  </div>

  <ng-scrollbar hlm class="w-full h-full rounded-2xl border" appearance="compact">
    <div
      class="results h-full p-1 grid gap-4 grid-cols-[repeat(auto-fill,minmax(150px,1fr))] md:grid-cols-[repeat(auto-fill,minmax(175px,1fr))] lg:grid-cols-[repeat(auto-fill,minmax(225px,1fr))]">
      @for (item of items; track item.id) {
        <ng-container
          *ngTemplateOutlet="mediaCoverItem; context: { $implicit: item }"></ng-container>
      }
    </div>
  </ng-scrollbar>
</section>

<ng-template #mediaCoverItem let-item>
  <me-media-carousel-cover-item
    class="w-full" [item]="item" />
</ng-template>
