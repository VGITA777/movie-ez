<a class="episode-card w-full">
  @if (!bp.sm()) {
    <ng-container *ngTemplateOutlet="mobile" />
  } @else {
    <ng-container *ngTemplateOutlet="desktop" />
  }
</a>


<ng-template #mobile>
  <div hlmCard class="container flex flex-row items-center w-full p-3 gap-4">
    <!-- Image -->
    <div
      class="relative aspect-video w-full min-w-[150px] max-w-[150px] object-cover rounded-md overflow-hidden">
      <img
        [ngSrc]="item().imgSrc"
        alt="Episode {{ item().episodeNumber }} poster"
        fill
      />
    </div>

    <!-- Descriptions -->
    <div class="episode-card__info flex flex-col gap-1 text-start">
      <h3 class="text-sm font-semibold line-clamp-2">
        Ep {{ item().episodeNumber }}: {{ item().name }}
      </h3>
      <p class="text-xs text-muted-foreground line-clamp-3">
        {{ item().overview }}
      </p>
    </div>
  </div>
</ng-template>

<ng-template #desktop>
  <div hlmCard class="container flex flex-col gap-4 w-full h-full p-3">
    <!-- Image -->
    <div
      class="relative aspect-video w-full object-cover rounded-md overflow-hidden">
      <img
        [ngSrc]="item().imgSrc"
        alt="Episode {{ item().episodeNumber }} poster"
        fill
      />
    </div>

    <!-- Descriptions -->
    <div class="episode-card__info flex flex-col gap-1 text-start">
      <h3 class="text-sm font-semibold line-clamp-2">
        Ep {{ item().episodeNumber }}: {{ item().name }}
      </h3>
      <p class="text-xs text-muted-foreground line-clamp-3">
        {{ item().overview }}
      </p>
    </div>
  </div>
</ng-template>
