<footer
  class="relative overflow-hidden isolate flex flex-col lg:flex-row justify-between mt-12 px-2 md:px-12 py-4 lg:py-14 border-t gap-2
         bg-[linear-gradient(135deg,hsl(var(--secondary)/0.35),hsl(var(--background)/0.95)_45%,hsl(var(--secondary)/0.25))]
         before:absolute before:inset-0 before:-z-10
         before:bg-[radial-gradient(circle_at_top_left,hsl(var(--primary)/0.16),transparent_35%),radial-gradient(circle_at_bottom_right,hsl(var(--muted-foreground)/0.10),transparent_35%)]
         after:absolute after:inset-x-0 after:top-0 after:h-px after:-z-10
         after:bg-linear-to-r after:from-transparent after:via-primary/40 after:to-transparent">
  <div class="footer__left flex flex-row gap-2 md:flex-col md:gap-0">
    <a
      class="site-name font-bold text-lg text-secondary-foreground tracking-tight"
      [routerLink]="['/']">
      MovieEz
    </a>

    <div
      class="copyright flex flex-row items-center gap-1 text-xs font-thin text-secondary-foreground/80 tracking-wider">
      <span>&copy;</span>
      <span>MovieEz. All Rights Reserved</span>
    </div>
  </div>

  <div class="footer__right w-full lg:max-w-[25%]">
    <p class="text-xs text-muted-foreground text-justify leading-relaxed">
      <strong class="text-secondary-foreground/90 font-medium">Media Disclaimer:</strong>
      All streamed content is provided by third-party APIs or sources. This website does not own,
      host, or claim ownership of any media content shown.
    </p>
  </div>
</footer>
