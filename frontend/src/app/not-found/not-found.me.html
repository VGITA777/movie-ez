<section class="error min-h-screen w-full flex items-center justify-center overflow-x-hidden">
  <div hlmEmpty class="from-muted/50 to-background min-h-screen w-full bg-linear-to-b from-30%">
    <div hlmEmptyHeader>
      <div hlmEmptyMedia variant="icon">
        <ng-icon name="lucideCircleAlert" />
      </div>
      <div hlmEmptyTitle>Not Found</div>
      <div hlmEmptyDescription>It seems like you wandered too far...</div>
    </div>

    <div hlmEmptyContent>
      <button hlmBtn variant="outline" size="default" [routerLink]="['/']">
        <ng-icon hlm name="lucideHouse" class="text-xs" />
        Go Home
      </button>
    </div>
  </div>
</section>
