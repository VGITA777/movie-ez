<nav
  #nav
  class="fixed top-0 left-0 right-0 w-screen z-50 flex flex-row items-center justify-between py-4 px-6 transition ease duration-500 "
  [ngClass]="{ 'bg-background/85': showBg(), 'border-b': showBg() }"
>
  <a class="brand font-bold text-2xl text-primary" [routerLink]="['/']">
    MovieEz
  </a>


  <hlm-dialog #searchDialog class="w-[40%] max-w-[400px]">
    <button
      hlmDialogTrigger
      hlmInputGroup
      class="search !bg-background/90 cursor-pointer text-muted-foreground hover:bg-accent/50 transition-colors">
      <span
        class="font-[Quicksand] flex-1 text-left text-sm bg-transparent px-3 py-2 pointer-events-none">
      Search...
    </span>
      <div hlmInputGroupAddon class="pointer-events-none" align="inline-start">
        <ng-icon name="lucideSearch" />
      </div>
    </button>

    <hlm-dialog-content
      *hlmDialogPortal="let ctx"
      class="p-0 max-w-[unset]! max-h-[unset]! overflow-hidden">
      <me-search
        class="w-[95vw] md:w-[80vw] lg:w-[70vw] max-w-[1250px] h-[80vh]"
        (onNavigateToWatchPage)="closeSearchDialog()" />
    </hlm-dialog-content>
  </hlm-dialog>
  <div class="settings-container">
    <button [hlmDropdownMenuTrigger]="profileMenu" class="w-fit p-0 rounded-full">
      <hlm-avatar size="lg" class="bg-accent">
        @let username = authService.user()?.nickname
          ?? authService.user()?.preferred_username
          ?? 'ME';
        <span hlmAvatarFallback>{{ username.slice(0, 2).toUpperCase() }}</span>
      </hlm-avatar>
    </button>
  </div>
</nav>


<ng-template #profileMenu>
  <hlm-dropdown-menu>
    <hlm-dropdown-menu-label>
      My Account
    </hlm-dropdown-menu-label>
    <hlm-dropdown-menu-group>
      <button hlmDropdownMenuItem [routerLink]="['/playlists']">Playlists</button>
    </hlm-dropdown-menu-group>

    <hlm-dropdown-menu-separator />

    <hlm-dropdown-menu-group>
      <button
        hlmDropdownMenuItem (click)="handleLoginAndLogout()"
        (keydown.shift.alt.L)="handleLoginAndLogout()">
        {{
          authService.isAuthenticated() ? 'Logout' : 'Login'
        }}
        <hlm-dropdown-menu-shortcut>
          ⇧+alt+L
        </hlm-dropdown-menu-shortcut>
      </button>
    </hlm-dropdown-menu-group>
  </hlm-dropdown-menu>
</ng-template>
