<div class="media-item w-full flex flex-col gap-1">
  @let itemData = item();

  <!-- Media Image Container-->
  <button
    (click)="itemClick.emit(itemData)"
    class="media-item-img__container group relative w-full aspect-2/3">

    <span
      class="text-[9rem] font-black absolute bottom-0 -left-10 z-10 leading-none opacity-85 text-shadow-lg">{{
        itemData.ranking
      }}</span>

    <img
      [ngSrc]="itemData.imgSrc" [alt]="itemData.title" fill
      class="object-cover overflow-hidden rounded-xl transition-transform duration-300 ease-out group-hover:scale-102"
      [title]="itemData.title">
  </button>

  <!-- Media Information -->
  <div class="media-item-info flex flex-col gap-1">
    <!-- Title -->
    <h3 class="media-item-specific-info__title font-bold leading-none">{{ itemData.title }}</h3>
    <!-- Rating, Genre, Year -->
    <div class="media-item-specific-info__container flex items-center gap-2 w-full ">
      <div class="media-item-specific-info__rating flex gap-1 items-center">
        <ng-icon
          class="text-xs text-amber-300 [&_svg]:fill-amber-300" name="lucideStar" />
        <span class="text-sm font-thin">{{ itemData.rating.toFixed(1) }}</span>
      </div>
      <span>&middot;</span>
      <span class="media-item-specific-info__genre text-sm font-thin">{{ itemData.genre }}</span>
      <span>&middot;</span>
      <span class="media-item-specific-info__year text-sm font-thin">{{ itemData.year }}</span>
    </div>
  </div>
</div>
