<div class="media-item w-full flex flex-col gap-1">
  @let itemData = item();

  <!-- Media Image Container-->
  <button
    (click)="itemClick.emit(itemData)"
    class="media-item-img__container group relative w-full aspect-2/3 overflow-hidden rounded-xl">
    <img
      [ngSrc]="itemData.imgSrc" [alt]="itemData.title" fill
      class="object-cover transition-transform duration-300 ease-out group-hover:scale-102"
      [title]="itemData.title">
  </button>

  <!-- Media Information -->
  <div class="media-item-info flex flex-col gap-1">
    <!-- Title -->
    <h3 class="media-item-specific-info__title font-bold leading-none line-clamp-1">{{
        itemData.title
      }}</h3>
    <!-- Rating, Genre, Year -->
    <div class="media-item-specific-info__container flex items-center gap-2 w-full min-w-0">
      <!-- Rating -->
      <div class="media-item-specific-info__rating flex gap-1 items-center shrink-0">
        <ng-icon
          class="text-xs text-amber-300 [&_svg]:fill-amber-300" name="lucideStar" />
        <span class="text-sm font-thin">{{ itemData.rating.toFixed(1) }}</span>
      </div>

      <!-- Genre -->
      @let genresToUse = primaryGenres();

      @if (genresToUse.length > 0) {
        <span class="shrink-0">&middot;</span>

        <div class="genres-container flex flex-row gap-1 items-center min-w-0">
          @for (genre of genresToUse; track genre) {
            <span class="media-item-specific-info__genre text-sm font-thin truncate">
          {{ genre }}
        </span>
          }
        </div>
      }

      <!-- Year -->
      <span class="shrink-0">&middot;</span>
      <span class="media-item-specific-info__year text-sm font-thin shrink-0">
    {{ itemData.year }}
  </span>
    </div>
  </div>
</div>
