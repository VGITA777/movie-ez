<div class="media-item w-full flex flex-col gap-2">
  @let itemData = item();

  <button
    (click)="itemClick.emit(itemData)"
    class="media-item-img__container relative w-full overflow-hidden rounded-xl aspect-video ">
    <me-interactive-media-card [item]="itemData" class="w-full h-full" />
  </button>

  <div class="media-item-info flex flex-row gap-2 items-center">
    <!-- Runtime -->
    <div class="media-item-specific-info__runtime__container flex items-center gap-1">
      <ng-icon name="lucideClock" class="text-sm" />
      <span class="media-item-specific-info__runtime text-sm font-thin">
        @if (itemData.type === 'movie') {
          {{ convertRuntimeToHoursAndMinutes(itemData.runtime) }}
        } @else {
          {{ itemData.runtime }} Seasons
        }
      </span>
    </div>
    <span>&middot;</span>

    <!-- Genre -->
    @if (itemData.genre) {
      <span class="media-item-specific-info__genre text-sm font-thin">{{ itemData.genre }}</span>
      <span>&middot;</span>
    }
    <!-- Rating -->
    <span class="media-item-specific-info__rating text-sm font-thin">{{
        itemData.rating.toFixed(1)
      }}</span>
  </div>
</div>
