<div
  meLongHover (longHover)="handleLongHover($event)" [longHoverDelay]="playOnHoverDelay()"
  class="interactive-media-card relative w-full h-full overflow-hidden">
  @let itemData = item();
  <img
    [ngSrc]="itemData.imgSrc" [alt]="itemData.title" [title]="itemData.title" fill
    class="z-0 object-cover">

  @if (startVideo() && item().videoSrc && sanitizedVideoSrc()) {
    <iframe
      [src]="sanitizedVideoSrc()"
      allow="autoplay; encrypted-media"
      class="absolute w-full h-full z-1 pointer-events-none"
      height="100%" width="100%"></iframe>
  }
</div>
