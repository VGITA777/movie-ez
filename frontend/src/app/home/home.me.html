<section class="home flex flex-col justify-center gap-24">
  <me-hero-slider
    [items]="items"
    class="w-full accent-background" />

  <!-- TODO: Create sliders that would house discovery medias -->
  <me-media-carousel [items]="mediaItemsPoster" [template]="mediaCoverItem" />

  <me-media-carousel [items]="mediaItemsBackdrop" [template]="mediaBackdropItem" />

  <me-media-carousel [items]="mediaItemsRanking" [template]="mediaRankingItem" />

</section>

<ng-template #mediaCoverItem let-item>
  <me-media-carousel-cover-item
    class="ml-4 self-stretch basis-[200px] md:basis-[225px] shrink-0" [item]="item"
    (itemClick)="handleItemClick($event)" />
</ng-template>

<ng-template #mediaBackdropItem let-item>
  <me-media-carousel-backdrop-item
    class="self-stretch basis-[325px] md:basis-[375px] ml-4 shrink-0"
    [item]="item"
    (itemClick)="handleItemClick($event)" />
</ng-template>

<ng-template #mediaRankingItem let-item>
  <me-media-carousel-top-item
    class="ml-16 self-stretch basis-[200px] md:basis-[225px] shrink-0"
    [item]="item"
    (itemClick)="handleItemClick($event)" />
</ng-template>
