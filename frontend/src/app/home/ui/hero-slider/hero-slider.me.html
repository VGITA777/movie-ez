<div
  class="hero-slider relative w-full">
  <hlm-carousel #carousel [options]="options" class="w-full h-full">
    <hlm-carousel-content>
      @for (item of items(); track item) {
        <hlm-carousel-item
          class="w-full h-[90vh] pl-0 mask-[linear-gradient(to_bottom,var(--background)_80%,transparent_95%)]">
          <me-hero-slider-item
            [item]="item"
            (handleAddToPlaylist)="handleAddToPlaylist.emit($event)"
            (handlePlay)="handlePlay.emit($event)" />
        </hlm-carousel-item>
      }
    </hlm-carousel-content>
  </hlm-carousel>

  <!-- Carousel Controls Container (Hidden on Mobile) -->
  <div class="carousel-controls hidden gap-4 absolute right-8 bottom-[20%] p-4 md:flex">
    <button
      (click)="onPrevious()" class="rounded-full backdrop-blur-sm" hlmBtn size="lg">
      <ng-icon class="text-lg" name="lucideChevronLeft" />
    </button>
    <button
      (click)="onNext()" class="rounded-full backdrop-blur-sm" hlmBtn size="lg">
      <ng-icon class="text-lg" name="lucideChevronRight" />
    </button>
  </div>
</div>
