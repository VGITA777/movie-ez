<!-- Carousel Entry Item Container-->
<div
  meVisibleFor meNotVisibleFor (visibleLongEnough)="startVideo.set(true)"
  (notVisibleLongEnough)="startVideo.set(false)"
  [style.background-image]="'url(' + item().imgSrc + ')'"
  class="carousel-item__container relative w-full h-full bg-cover bg-center">

  <!-- If the image has been on the screen for some time and playing video is allowed and video source is present -->
  @if (startVideo() && playVideo() && item().videoSrc) {
    <iframe
      [src]="this.sanitizeUri(item().videoSrc!)"
      allow="autoplay; encrypted-media"
      class="absolute top-1/2 left-1/2 w-dvw h-[56.25dvw] min-w-[177.77dvh] min-h-dvh max-w-none -translate-x-1/2 -translate-y-1/2 scale-105 z-0 pointer-events-none"
      height="100%" width="100%"></iframe>
  }
  <!-- Carousel Item Contents Container -->
  <div
    class="carousel-item-content absolute left-8 bottom-[20%] w-[90%] md:w-[80%] md:max-w-175 flex flex-col gap-5">
    <h1
      class="text-4xl md:text-5xl font-bold text-white uppercase tracking-widest drop-shadow-xl">
      {{ item().title }}
    </h1>
    <p class="font-light line-clamp-3 text-justify select-none lg:line-clamp-4">{{
        item().description
      }}</p>

    <!-- Ratings Container -->
    <div
      class="carousel-item-rating__container flex flex-wrap gap-8 items-center select-none">
      <div class="rating__star flex gap-1 items-center">
        <ng-icon
          class="text-md text-amber-300 [&_svg]:fill-amber-300" name="lucideStar" />
        <span class="text-md">{{ item().rating.toFixed(1) }}</span>
      </div>
      <span class="rating__year text-md">{{ item().year }}</span>
      <span
        class="rating__tag inline-flex items-center gap-2 rounded-full border border-white/25 bg-white/10 px-3 py-1 text-sm font-medium tracking-wide text-white backdrop-blur-sm shadow-[0_2px_10px_rgba(0,0,0,0.25)]">
                  <span class="h-1.5 w-1.5 rounded-full bg-amber-300"></span>{{ item().tag.trim() }}
                </span>
    </div>

    <!-- Play Now & add to Playlist Container -->
    <div class="carousel-item-content__buttons w-full flex gap-4 flex-wrap">
      <button
        (click)="handlePlay.emit(item())"
        class="horizontal px-6 py-4 md:p-0 md:w-full md:max-w-40"
        hlmBtn
        size="lg">
        <ng-icon class="text-sm" name="lucidePlay" />
        <span class="hidden md:inline">Play Now</span>
      </button>
      <button
        (click)="handleAddToPlaylist.emit(item())"
        class="horizontal px-6 py-4 md:p-0 md:w-full md:max-w-40" hlmBtn
        size="lg" variant="secondary">
        <ng-icon class="text-md" name="lucidePlus" />
        <span class="hidden md:inline">My List</span>
      </button>
    </div>
  </div>
</div>
