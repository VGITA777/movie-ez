<div class="container">
  <section class="main-contents">
    <app-image-title [src]="posterImageUrl()" title="" width="100%"/>
    <app-chip-slider [data]="genresName()"/>
  </section>
  <section class="text-contents">
    <div class="generic-data">

      <div class="long-texts">
        <div class="long-text-entry">
          <span class="title">Title</span>
          <span class="subtitle">{{ mediaDetails.value().title }}</span>
        </div>
        <div class="long-text-entry">
          <span class="title">Aired on</span>
          <span class="subtitle">{{ mediaDetails.value().release_date }}</span>
        </div>
      </div>

      <div class="short-texts">
        <div class="short-text-entry">
          <span class="title">Rating</span>
          <span class="subtitle">{{ mediaDetails.value().vote_average.toFixed(2) }}</span>
        </div>
        <div class="short-text-entry">
          <span class="title">Status</span>
          <span class="subtitle">{{ mediaDetails.value().status }}</span>
        </div>
        <div class="short-text-entry">
          <span class="title">Duration</span>
          <span class="subtitle">{{ duration() }}</span>
        </div>
      </div>
    </div>

    <app-read-more-text contentTextAlign="justify" contentTextSize=".8rem" headerText="Overview" headerTextSize="1rem"
                        headerTextWeight="500">
      {{ overview() }}
    </app-read-more-text>
  </section>
</div>
