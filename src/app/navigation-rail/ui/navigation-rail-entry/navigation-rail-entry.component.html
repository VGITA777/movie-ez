<button (click)="onClickHandler()" [ngClass]="{ 'selected': isActive() }" class="container">
  <div class="icon">
    @if (isActive()) {
      <ng-content select="[iconActive]"></ng-content>
    } @else {
      <ng-content select="[iconInactive]"></ng-content>
    }
  </div>
  <div class="content">
    <ng-content select="[content]"></ng-content>
  </div>
</button>
