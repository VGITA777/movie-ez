<div class="input-container">
  <div (click)="handleLeftIconClick()" appButtonRole class="icon-wrapper">
    <ng-content select="[icon]"></ng-content>
  </div>
  <div class="input-wrapper">
    <input [(ngModel)]="text" [placeholder]="placeHolder()" type="text"/>
  </div>
  <div (click)="handleRightIconClick()" appButtonRole class="icon-wrapper">
    <ng-content select="[right-icon]"></ng-content>
  </div>
</div>
