@if (progressType() === 'indeterminate') {
  <app-indeterminate-progress-bar/>
}

<!-- Loading Screen Overlay -->
@if (showLoadingScreen()) {
  <div #loadingContainer class="loading-container" [ngClass]="{'fade-out': isDeletingLoadingScreen()}">
    <app-loading/>
  </div>
}

<div [style.padding-bottom]="`${bottomNavBarHeight() + 12}px`" class="container">
  @if (!isTabletMedium() && !isMobile()) {
    <aside class="content-container">
      <app-navigation-rail/>
    </aside>
  }
  <main class="content-container">
    <router-outlet></router-outlet>
  </main>

  @if (isMobile() || isTabletMedium()) {
    <aside #bottomNavBar class="mobile-navigation-container">
      <app-bottom-nav-bar>
        <!-- Home -->
        <app-bottom-nav-item (onClick)="navigator.navigateToHome()"
                             [isActive]="locationListener.currentLocation() === 'home'">
          <svg #icon slot=icon viewBox="0 -960 960 960" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"/>
          </svg>
        </app-bottom-nav-item>
        <!-- Movie -->
        <app-bottom-nav-item (onClick)="navigator.navigateToMovies()"
                             [isActive]="locationListener.currentLocation() === 'movies'">>
          <svg #icon slot=icon viewBox="0 -960 960 960" xmlns="http://www.w3.org/2000/svg">
            <path
              d="m160-800 80 160h120l-80-160h80l80 160h120l-80-160h80l80 160h120l-80-160h120q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800Zm0 240v320h640v-320H160Zm0 0v320-320Z"/>
          </svg>
        </app-bottom-nav-item>
        <!-- Search -->
        <app-bottom-nav-item (onClick)="navigator.navigateToSearch()"
                             [isActive]="locationListener.currentLocation() === 'search'">>
          <svg #icon slot=icon viewBox="0 -960 960 960" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z"/>
          </svg>
        </app-bottom-nav-item>
        <!-- TV -->
        <app-bottom-nav-item (onClick)="navigator.navigateToTvShows()"
                             [isActive]="locationListener.currentLocation() === 'tv-shows'">>>
          <svg #icon slot=icon viewBox="0 -960 960 960" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M320-120v-80H160q-33 0-56.5-23.5T80-280v-480q0-33 23.5-56.5T160-840h640q33 0 56.5 23.5T880-760v480q0 33-23.5 56.5T800-200H640v80H320ZM160-280h640v-480H160v480Zm0 0v-480 480Z"/>
          </svg>
        </app-bottom-nav-item>
        <!-- Settings -->
        <app-bottom-nav-item (onClick)="navigator.navigateToSettingsPlayer()"
                             [isActive]="locationListener.currentLocation() === 'settings'">>
          <svg #icon slot=icon viewBox="0 -960 960 960" xmlns="http://www.w3.org/2000/svg">
            <path
              d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm70-80h79l14-106q31-8 57.5-23.5T639-327l99 41 39-68-86-65q5-14 7-29.5t2-31.5q0-16-2-31.5t-7-29.5l86-65-39-68-99 42q-22-23-48.5-38.5T533-694l-13-106h-79l-14 106q-31 8-57.5 23.5T321-633l-99-41-39 68 86 64q-5 15-7 30t-2 32q0 16 2 31t7 30l-86 65 39 68 99-42q22 23 48.5 38.5T427-266l13 106Zm42-180q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm-2-140Z"/>
          </svg>
        </app-bottom-nav-item>
      </app-bottom-nav-bar>
    </aside>
  }
</div>
