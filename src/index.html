<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MovieEz</title>
  <base href="/">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <link href="favicon.ico" rel="icon" type="image/x-icon">
</head>
<body class="dark-mode">
<app-root>
  <div class="loading-container">
    <div class="loading-content">
      <span class="char" style="--delay: 0; width: auto;">M</span>
      <span class="char" style="--delay: 1; width: auto;">o</span>
      <span class="char" style="--delay: 2; width: auto;">v</span>
      <span class="char" style="--delay: 3; width: auto;">i</span>
      <span class="char" style="--delay: 4; width: auto;">e</span>
      <span class="char" style="--delay: 5; width: .4rem;"> </span>
      <span class="char" style="--delay: 6; width: auto;">E</span>
      <span class="char" style="--delay: 7; width: auto;">z</span>
    </div>
  </div>

</app-root>
</body>
</html>
